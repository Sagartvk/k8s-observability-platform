apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: cpu.rules
    rules:
    - alert: HighCPUUsage
      expr: |
        (
          sum(rate(container_cpu_usage_seconds_total{
            namespace="app",
            container!="",
            container!="POD"
          }[5m])) by (pod, container)
          /
          sum(kube_pod_container_resource_limits{
            namespace="app",
            resource="cpu"
          }) by (pod, container)
        ) * 100 > 80
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "High CPU on pod {{ $labels.pod }}"
        description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using {{ $value | printf \"%.1f\" }}% CPU — above 80% threshold for 1 minute."
